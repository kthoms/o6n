# -----------------------------------------------------------------------------
# Stock skin
# -----------------------------------------------------------------------------
colors:
  bg:       "black"
  fg:       "dodgerblue"
  fgMuted:  "gray"
  accent:   "aqua"
  accentAlt: "orange"
  surface:    "black"
  surfaceAlt: "steelblue"
  success: "greenyellow"
  warning: "darkorange"
  danger:  "orangered"
  info:    "lightskyblue"
  borderFg:    "dodgerblue"
  borderFocus: "aqua"
  crumbBg:       "steelblue"
  crumbFg:       "black"
  crumbActiveBg: "orange"
  crumbActiveFg: "black"
  jsonKey:    "steelblue"
  jsonValue:  "papayawhip"
  jsonNumber: "orange"
  jsonBool:   "mediumpurple"
  btnPrimaryBg:   "dodgerblue"
  btnPrimaryFg:   "black"
  btnSecondaryBg: "gray"
  btnSecondaryFg: "black"

# Legacy schema retained for reference (ignored when colors: is present)
o6n:
  body:
    fgColor: dodgerblue
    bgColor: black
    logoColor: orange
  prompt:
    fgColor: cadetblue
    bgColor: black
    suggestColor: dodgerblue
  info:
    fgColor: orange
    sectionColor: white
  dialog:
    fgColor: dodgerblue
    bgColor: black
    buttonFgColor: black
    buttonBgColor: dodgerblue
    buttonFocusFgColor: white
    buttonFocusBgColor: fuchsia
    labelFgColor: fuchsia
    fieldFgColor: dodgerblue
  frame:
    border:
      fgColor: dodgerblue
      focusColor: aqua
    menu:
      fgColor: white
      fgStyle: dim
      keyColor: dodgerblue
      numKeyColor: fuchsia
    crumbs:
      fgColor: black
      bgColor: steelblue
      activeColor: orange
    status:
      newColor: lightskyblue
      modifyColor: greenyellow
      addColor: white
      errorColor: orangered
      pendingColor: darkorange
      highlightColor: aqua
      killColor: mediumpurple
      completedColor: gray
    title:
      fgColor: aqua
      highlightColor: fuchsia
      counterColor: papayawhip
      filterColor: steelblue
  views:
    # Charts skins...
    charts:
      bgColor: black
      defaultDialColors:
        - linegreen
        - orangered
      defaultChartColors:
        - linegreen
        - orangered
    table:
      fgColor: blue
      bgColor: black
      cursorFgColor: black
      cursorBgColor: aqua
      markColor: darkgoldenrod
      header:
        fgColor: white
        bgColor: black
        sorterColor: orange
    xray:
      fgColor: blue
      bgColor: black
      cursorColor: aqua
      graphicColor: darkgoldenrod
      showIcons: false
    yaml:
      keyColor: steelblue
      colonColor: white
      valueColor: papayawhip
    logs:
      fgColor: white
      bgColor: black
      indicator:
        fgColor: dodgerblue
        bgColor: black
        toggleOnColor: papayawhip
        toggleOffColor: steelblue
