          param: processInstanceId
          column: id
        - target: task
          param: processInstanceId
          column: id
        - target: incident
          param: processInstanceId
          column: id
        - target: variable-instance
          param: processInstanceId
          column: id
      actions:
        - key: s
          label: Suspend Instance
          method: PUT
          path: /process-instance/{id}/suspended
          body: '{"suspended":true}'
        - key: r
          label: Resume Instance
          method: PUT
          path: /process-instance/{id}/suspended
          body: '{"suspended":false}'
        - key: ctrl+d
          label: Delete Instance
          method: DELETE
          path: /process-instance/{id}
          confirm: true
    - name: process-variables
      columns:
        - name: name
          visible: true
          width: 30%
          align: left
        - name: value
          visible: true
          width: 70%
          align: left
          editable: true
          input_type: auto
    - name: task
