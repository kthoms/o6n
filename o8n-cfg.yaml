          method: POST
          path: /task/{id}/unclaim
        - key: d
          label: Delegate Task
          method: POST
          path: /task/{id}/delegate
          body: '{}'
        - key: ctrl+d
          label: Delete Task
          method: DELETE
          path: /task/{id}
          confirm: true
