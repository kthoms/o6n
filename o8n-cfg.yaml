tables:
    - name: external-task
      columns:
        - name: id
          visible: true
          width: 25%
          align: left
        - name: topicName
          visible: true
          width: 25%
          align: left
        - name: workerId
          visible: true
          width: 25%
          align: left
        - name: lockExpirationTime
          visible: true
          width: 25%
          align: left
      drilldown:
        - target: history-external-task-log
          param: externalTaskId
          column: id
      actions:
        - key: u
          label: Unlock
          method: POST
          path: /external-task/{id}/unlock
        - key: r
          label: Set Retries
          method: PUT
          path: /external-task/{id}/retries
          body: '{"retries":3}'
        - key: x
          label: Extend Lock
          method: POST
          path: /external-task/{id}/extendLock
          body: '{"newDuration":600000}'
    - name: job
      columns:
        - name: id
          visible: true
          width: 20%
          align: left
        - name: jobDefinitionId
          visible: false
          width: ""
          align: ""
        - name: dueDate
          visible: false
          width: ""
          align: ""
        - name: processInstanceId
          visible: false
          width: ""
          align: ""
        - name: processDefinitionKey
          visible: true
          width: 25%
          align: left
        - name: executionId
          visible: false
          width: ""
          align: ""
        - name: retries
          visible: true
          width: 10%
          align: center
        - name: exceptionMessage
          visible: true
          width: 25%
          align: left
        - name: failedActivityId
          visible: true
          width: 20%
          align: left
        - name: suspended
          visible: false
          width: ""
          align: ""
        - name: priority
          visible: false
          width: ""
          align: ""
        - name: tenantId
          visible: false
          width: ""
          align: ""
        - name: createTime
          visible: false
          width: ""
          align: ""
        - name: batchId
          visible: false
          width: ""
          align: ""
      drilldown:
        - target: history-job-log
          param: jobId
          column: id
      actions:
        - key: r
          label: Retry (retries=1)
          method: PUT
          path: /job/{id}/retries
          body: '{"retries":1}'
        - key: x
          label: Execute Job
          method: POST
          path: /job/{id}/execute
        - key: s
          label: Suspend Job
          method: PUT
          path: /job/{id}/suspended
          body: '{"suspended":true}'
        - key: a
          label: Activate Job
          method: PUT
          path: /job/{id}/suspended
          body: '{"suspended":false}'
        - key: ctrl+d
          label: Delete Job
          method: DELETE
          path: /job/{id}
          confirm: true
    - name: job-definition
      columns:
        - name: id
          visible: true
          width: 20%
          align: left
        - name: processInstanceId
          visible: false
          width: ""
          align: ""
        - name: processDefinitionKey
          visible: true
          width: 25%
          align: left
        - name: activityId
          visible: true
          width: 20%
          align: left
        - name: jobType
          visible: true
          width: 15%
          align: left
        - name: jobConfiguration
          visible: false
          width: ""
          align: ""
        - name: suspended
          visible: true
          width: 10%
          align: center
        - name: overridingJobPriority
          visible: false
          width: ""
          align: ""
        - name: tenantId
          visible: false
          width: ""
          align: ""
        - name: deploymentId
          visible: false
          width: ""
          align: ""
      drilldown:
        - target: job
          param: jobDefinitionId
          column: id
      actions:
        - key: s
          label: Suspend Job Definition
          method: PUT
          path: /job-definition/{id}/suspended
          body: '{"suspended":true}'
        - key: a
          label: Activate Job Definition
          method: PUT
          path: /job-definition/{id}/suspended
          body: '{"suspended":false}'
    - name: process-definition
      columns:
        - name: key
          visible: true
          width: 20%
          align: left
        - name: name
          visible: true
          width: 40%
          align: left
        - name: version
          visible: true
          width: 15%
          align: center
        - name: resource
          visible: true
          width: 25%
          align: left
      drilldown:
        - target: process-instance
          param: processDefinitionId
          column: id
        - target: history-process-instance
          param: processDefinitionId
          column: id
      actions:
        - key: s
          label: Suspend Definition
          method: PUT
          path: /process-definition/key/{id}/suspended
          body: '{"suspended":true,"includeProcessInstances":false}'
          id_column: key
        - key: a
          label: Activate Definition
          method: PUT
          path: /process-definition/key/{id}/suspended
          body: '{"suspended":false,"includeProcessInstances":false}'
          id_column: key
        - key: ctrl+d
          label: Delete Definition
          method: DELETE
          path: /process-definition/key/{id}
          id_column: key
          confirm: true
    - name: process-instance
      columns:
        - name: id
          visible: true
          width: 30%
          align: left
        - name: definitionId
          visible: true
          width: 30%
          align: left
        - name: businessKey
          visible: true
          width: 20%
          align: left
        - name: startTime
          visible: true
          width: 20%
          align: left
      drilldown:
